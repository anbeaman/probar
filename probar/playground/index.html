<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>probar 接口测试台</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --line: #d9e2ef;
      --line-strong: #c5d1df;
      --text: #172033;
      --muted: #64748b;
      --muted-strong: #475569;
      --accent: #0f766e;
      --accent-soft: #e6fffb;
      --blue: #2563eb;
      --blue-soft: #eff6ff;
      --warn: #b45309;
      --warn-soft: #fff7ed;
      --danger: #b42318;
      --danger-soft: #fff1f2;
      --shadow: 0 14px 35px rgba(15, 23, 42, 0.08);
      --radius: 8px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: var(--bg);
      font-family: var(--sans);
      line-height: 1.5;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.62;
    }

    .app-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 18px 28px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(12px);
    }

    .brand {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 14px;
    }

    .brand-mark {
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: var(--radius);
      color: #ffffff;
      background: linear-gradient(135deg, #0f766e, #2563eb);
      font-family: var(--mono);
      font-weight: 800;
      letter-spacing: 0;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .load-status {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 11px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted-strong);
      background: var(--surface-soft);
      font-size: 13px;
      white-space: nowrap;
    }

    .load-status::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--blue);
    }

    .load-status.is-error::before {
      background: var(--danger);
    }

    .load-status.is-ready::before {
      background: var(--accent);
    }

    .workspace {
      flex: 1;
      display: grid;
      grid-template-columns: minmax(280px, 340px) minmax(0, 1fr);
      gap: 20px;
      width: 100%;
      max-width: 1560px;
      margin: 0 auto;
      padding: 20px 28px 28px;
    }

    .sidebar {
      min-width: 0;
    }

    .sidebar-inner {
      position: sticky;
      top: 98px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-height: calc(100vh - 120px);
      min-height: 0;
    }

    .side-card,
    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .side-card {
      padding: 14px;
    }

    .field-label,
    .search-label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted-strong);
      font-size: 13px;
      font-weight: 700;
    }

    .search-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 40px;
      padding: 0 11px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: #ffffff;
    }

    .search-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
    }

    .search-icon {
      color: var(--muted);
      font-size: 16px;
    }

    .search-wrap input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      color: var(--text);
      background: transparent;
    }

    .matrix-button {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin-top: 12px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--text);
      background: var(--surface-soft);
      font-weight: 700;
    }

    .matrix-button:hover,
    .matrix-button.is-active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
    }

    .catalog-list {
      overflow: auto;
      padding-right: 4px;
    }

    .catalog-group {
      margin-bottom: 14px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .group-head {
      padding: 12px 12px 10px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-soft);
    }

    .group-label {
      font-weight: 800;
    }

    .group-namespace {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
    }

    .method-list {
      display: grid;
      gap: 0;
    }

    .method-button {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 9px;
      width: 100%;
      padding: 11px 12px;
      border: 0;
      border-bottom: 1px solid var(--line);
      color: var(--text);
      background: #ffffff;
      text-align: left;
    }

    .method-button:last-child {
      border-bottom: 0;
    }

    .method-button:hover {
      background: var(--blue-soft);
    }

    .method-button.is-active {
      background: var(--accent-soft);
      box-shadow: inset 4px 0 0 var(--accent);
    }

    .method-button.is-muted {
      color: var(--muted-strong);
    }

    .method-status {
      padding-top: 2px;
      font-size: 13px;
      font-weight: 800;
    }

    .method-status.ok {
      color: var(--accent);
    }

    .method-status.no {
      color: var(--muted);
    }

    .method-name {
      display: block;
      overflow: hidden;
      color: inherit;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .method-summary {
      display: -webkit-box;
      margin-top: 3px;
      overflow: hidden;
      color: var(--muted);
      font-size: 12px;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .empty-state {
      padding: 22px;
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      color: var(--muted);
      background: rgba(255, 255, 255, 0.7);
      text-align: center;
    }

    .content {
      min-width: 0;
      display: grid;
      align-content: start;
      gap: 16px;
    }

    .card {
      overflow: hidden;
    }

    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .card-head h2,
    .card-head h3 {
      font-size: 17px;
      letter-spacing: 0;
    }

    .card-body {
      padding: 18px 20px 20px;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .signature {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .code-line,
    code {
      font-family: var(--mono);
    }

    .code-line {
      overflow-x: auto;
      max-width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-soft);
      color: #0f172a;
      font-size: 14px;
      white-space: nowrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .badge.ok {
      color: #0f766e;
      background: #dcfce7;
    }

    .badge.no {
      color: #475569;
      background: #e2e8f0;
    }

    .section-title {
      margin-bottom: 10px;
      color: var(--muted-strong);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .summary-text {
      color: var(--text);
    }

    .doc-block,
    .text-block,
    .json-block {
      overflow: auto;
      max-width: 100%;
      margin: 0;
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-soft);
      color: #1f2937;
      font-family: var(--mono);
      font-size: 12.5px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .notice {
      padding: 12px 13px;
      border: 1px solid #fed7aa;
      border-radius: var(--radius);
      color: var(--warn);
      background: var(--warn-soft);
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 560px;
    }

    th,
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 13px;
    }

    th {
      color: var(--muted-strong);
      background: var(--surface-soft);
      font-weight: 800;
      white-space: nowrap;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    td {
      color: var(--text);
      word-break: break-word;
    }

    .params-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .param-field {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-soft);
    }

    .param-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .param-name {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 4px;
      font-family: var(--mono);
      font-weight: 800;
    }

    .required {
      color: var(--danger);
      font-family: var(--sans);
    }

    .type-pill {
      flex: 0 0 auto;
      max-width: 48%;
      overflow: hidden;
      padding: 3px 7px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted-strong);
      background: #ffffff;
      font-family: var(--mono);
      font-size: 11px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .param-input {
      width: 100%;
      min-width: 0;
      height: 38px;
      padding: 8px 10px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      outline: 0;
      color: var(--text);
      background: #ffffff;
    }

    .param-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
    }

    .param-help {
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
    }

    .actions {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 8px 14px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      color: var(--text);
      background: #ffffff;
      font-weight: 800;
    }

    .btn:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
    }

    .btn.primary {
      border-color: var(--accent);
      color: #ffffff;
      background: var(--accent);
    }

    .btn.primary:hover:not(:disabled) {
      color: #ffffff;
      background: #115e59;
    }

    .result-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .meta-item,
    .attr-pill {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      gap: 6px;
      padding: 6px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted-strong);
      background: var(--surface-soft);
      font-size: 12px;
    }

    .meta-value,
    .attr-value {
      overflow: hidden;
      color: var(--text);
      font-family: var(--mono);
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .result-note {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
      color: var(--muted-strong);
      font-size: 13px;
    }

    .attrs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .error-box {
      padding: 13px;
      border: 1px solid #fecdd3;
      border-radius: var(--radius);
      color: var(--danger);
      background: var(--danger-soft);
    }

    .error-type {
      margin-bottom: 4px;
      font-family: var(--mono);
      font-weight: 800;
    }

    .raw-json {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
    }

    .raw-json summary {
      padding: 10px 12px;
      color: var(--muted-strong);
      font-weight: 800;
      cursor: pointer;
    }

    .raw-json .json-block {
      border: 0;
      border-top: 1px solid var(--line);
      border-radius: 0 0 var(--radius) var(--radius);
    }

    .loading-line {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted-strong);
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--line-strong);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .matrix-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
      color: var(--muted-strong);
      font-size: 13px;
    }

    .support {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-weight: 800;
      white-space: nowrap;
    }

    .support.yes {
      color: var(--accent);
    }

    .support.no {
      color: var(--muted);
    }

    .support.text {
      color: var(--blue);
    }

    @media (max-width: 900px) {
      .topbar {
        position: static;
        align-items: flex-start;
        padding: 16px;
        flex-direction: column;
      }

      .workspace {
        grid-template-columns: 1fr;
        padding: 16px;
      }

      .sidebar-inner {
        position: static;
        max-height: none;
      }

      .catalog-list {
        max-height: 48vh;
      }

      .params-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .brand {
        align-items: flex-start;
      }

      .brand-mark {
        width: 38px;
        height: 38px;
      }

      h1 {
        font-size: 19px;
      }

      .card-head,
      .card-body {
        padding: 15px;
      }

      .card-head {
        flex-direction: column;
      }

      table {
        min-width: 480px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">pb</div>
        <div>
          <h1>probar 接口测试台</h1>
          <p class="subtitle">本地 A 股数据接入层接口调试与返回结构查看</p>
        </div>
      </div>
      <div id="loadStatus" class="load-status">正在连接本地接口</div>
    </header>

    <main class="workspace">
      <aside class="sidebar" aria-label="接口列表">
        <div class="sidebar-inner">
          <div class="side-card">
            <label class="search-label" for="searchInput">搜索接口</label>
            <div class="search-wrap">
              <span class="search-icon" aria-hidden="true">⌕</span>
              <input id="searchInput" type="search" autocomplete="off" placeholder="名称、summary、命名空间" />
            </div>
            <button id="matrixButton" class="matrix-button" type="button">
              <span>能力矩阵</span>
              <span aria-hidden="true">→</span>
            </button>
          </div>
          <div id="catalogList" class="catalog-list"></div>
        </div>
      </aside>

      <section id="content" class="content" aria-live="polite">
        <div class="card">
          <div class="card-body">
            <div class="loading-line">
              <span class="spinner" aria-hidden="true"></span>
              <span>正在加载接口目录…</span>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    (function () {
      "use strict";

      var state = {
        catalog: [],
        capabilities: [],
        methods: [],
        methodMap: new Map(),
        selectedKey: "",
        activeView: "interface",
        query: "",
        requestSeq: 0
      };

      var OMIT = Symbol("omit");
      var catalogList = document.getElementById("catalogList");
      var content = document.getElementById("content");
      var searchInput = document.getElementById("searchInput");
      var matrixButton = document.getElementById("matrixButton");
      var loadStatus = document.getElementById("loadStatus");

      function escapeHtml(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function node(tagName, className, text) {
        var el = document.createElement(tagName);
        if (className) {
          el.className = className;
        }
        if (text !== undefined) {
          el.textContent = String(text);
        }
        return el;
      }

      function clear(el) {
        el.replaceChildren();
      }

      function asArray(value) {
        return Array.isArray(value) ? value : [];
      }

      function safeString(value) {
        return value == null ? "" : String(value);
      }

      function formatCell(value) {
        if (value === null || value === undefined) {
          return "—";
        }
        if (Array.isArray(value) || typeof value === "object") {
          try {
            return JSON.stringify(value);
          } catch (error) {
            return String(value);
          }
        }
        return String(value);
      }

      function formatInputValue(value) {
        if (value === null || value === undefined) {
          return "";
        }
        if (Array.isArray(value)) {
          return value.map(formatCell).join(", ");
        }
        if (typeof value === "object") {
          try {
            return JSON.stringify(value);
          } catch (error) {
            return String(value);
          }
        }
        return String(value);
      }

      function methodKey(namespace, name) {
        return encodeURIComponent(safeString(namespace)) + "::" + encodeURIComponent(safeString(name));
      }

      function setStatus(text, className) {
        loadStatus.className = "load-status" + (className ? " " + className : "");
        loadStatus.textContent = text;
      }

      function normalizeCatalog(catalog) {
        state.methodMap = new Map();
        state.methods = [];

        state.catalog = asArray(catalog).map(function (group) {
          var namespace = safeString(group && group.namespace);
          var label = safeString(group && group.label) || namespace || "未命名数据源";
          var methods = asArray(group && group.methods).map(function (method) {
            var item = Object.assign({}, method);
            item.namespace = namespace;
            item.label = label;
            item.name = safeString(item.name);
            item.summary = safeString(item.summary);
            item.doc = safeString(item.doc);
            item.note = safeString(item.note);
            item.params = asArray(item.params);
            item.example = item.example && typeof item.example === "object" ? item.example : {};
            item.implemented = Boolean(item.implemented);
            item.key = methodKey(namespace, item.name);
            state.methodMap.set(item.key, item);
            state.methods.push(item);
            return item;
          });

          return {
            namespace: namespace,
            label: label,
            methods: methods
          };
        });
      }

      function matchesQuery(method, query) {
        if (!query) {
          return true;
        }
        var haystack = [
          method.name,
          method.summary,
          method.namespace,
          method.label
        ].join(" ").toLowerCase();
        return haystack.indexOf(query) !== -1;
      }

      function renderSidebar() {
        clear(catalogList);
        matrixButton.classList.toggle("is-active", state.activeView === "matrix");

        var query = state.query;
        var matched = 0;

        state.catalog.forEach(function (group) {
          var methods = group.methods.filter(function (method) {
            return matchesQuery(method, query);
          });

          if (!methods.length) {
            return;
          }

          matched += methods.length;

          var groupEl = node("section", "catalog-group");
          var head = node("div", "group-head");
          var label = node("div", "group-label", group.label);
          var ns = node("code", "group-namespace", "pb." + group.namespace);
          head.append(label, ns);
          groupEl.appendChild(head);

          var methodList = node("div", "method-list");
          methods.forEach(function (method) {
            var button = node("button", "method-button", "");
            button.type = "button";
            button.dataset.key = method.key;
            button.classList.toggle("is-active", state.activeView === "interface" && state.selectedKey === method.key);
            button.classList.toggle("is-muted", !method.implemented);

            var status = node("span", "method-status " + (method.implemented ? "ok" : "no"), method.implemented ? "●" : "○");
            var body = node("span", "method-copy");
            var name = node("span", "method-name", method.name);
            var summary = node("span", "method-summary", (method.implemented ? "已实现 · " : "未实现 · ") + (method.summary || "暂无摘要"));
            body.append(name, summary);
            button.append(status, body);

            button.addEventListener("click", function () {
              selectInterface(method.key);
            });

            methodList.appendChild(button);
          });

          groupEl.appendChild(methodList);
          catalogList.appendChild(groupEl);
        });

        if (!matched) {
          catalogList.appendChild(node("div", "empty-state", "无匹配接口"));
        }
      }

      function selectInterface(key) {
        var method = state.methodMap.get(key);
        if (!method) {
          return;
        }
        state.activeView = "interface";
        state.selectedKey = key;
        state.requestSeq += 1;
        renderSidebar();
        renderInterface(method);
      }

      function renderInterface(method) {
        clear(content);
        content.appendChild(buildSignatureCard(method));
        content.appendChild(buildDescriptionCard(method));

        if (method.returns) {
          content.appendChild(buildReturnsCard(method));
        }

        content.appendChild(buildParamsCard(method));
        content.appendChild(buildResultCard());
      }

      function formatSignatureParam(param) {
        var name = safeString(param && param.name) || "param";
        var required = Boolean(param && param.required);
        var hasDefault = param && Object.prototype.hasOwnProperty.call(param, "default") && param.default !== undefined && param.default !== null;

        if (required || !hasDefault) {
          return name;
        }
        return name + "=" + formatCell(param.default);
      }

      function buildSignatureCard(method) {
        var card = node("section", "card");
        var head = node("div", "card-head");
        var title = node("h2", "", "接口签名");
        var badge = node("span", "badge " + (method.implemented ? "ok" : "no"), method.implemented ? "● 已实现" : "○ 未实现");
        head.append(title, badge);

        var body = node("div", "card-body");
        var signature = node("div", "signature");
        var code = node("code", "code-line", "pb." + method.namespace + "." + method.name + "(" + method.params.map(formatSignatureParam).join(", ") + ")");
        signature.appendChild(code);
        body.appendChild(signature);

        card.append(head, body);
        return card;
      }

      function buildDescriptionCard(method) {
        var card = node("section", "card");
        var head = node("div", "card-head");
        head.appendChild(node("h3", "", "说明"));

        var body = node("div", "card-body stack");
        var summaryWrap = node("div", "");
        summaryWrap.appendChild(node("div", "section-title", "摘要"));
        summaryWrap.appendChild(node("p", "summary-text", method.summary || "暂无摘要。"));
        body.appendChild(summaryWrap);

        var docWrap = node("div", "");
        docWrap.appendChild(node("div", "section-title", "完整 docstring"));
        docWrap.appendChild(node("pre", "doc-block", method.doc || "暂无完整 docstring。"));
        body.appendChild(docWrap);

        if (!method.implemented) {
          body.appendChild(node("div", "notice", method.note || "该接口尚未实现。"));
        }

        card.append(head, body);
        return card;
      }

      function buildReturnsCard(method) {
        var returns = method.returns || {};
        var kind = safeString(returns.kind);
        var titleText = kind === "DataFrame" ? "DataFrame 列" : kind === "dict" ? "dict 键" : (kind || "返回字段");
        var fields = asArray(returns.fields);

        var card = node("section", "card");
        var head = node("div", "card-head");
        head.appendChild(node("h3", "", "返回数据格式"));

        var body = node("div", "card-body stack");
        body.appendChild(node("p", "summary-text", "kind: " + titleText));

        if (fields.length) {
          var wrap = node("div", "table-wrap");
          var table = document.createElement("table");
          var thead = document.createElement("thead");
          var headRow = document.createElement("tr");
          ["字段", "含义", "单位"].forEach(function (label) {
            headRow.appendChild(node("th", "", label));
          });
          thead.appendChild(headRow);

          var tbody = document.createElement("tbody");
          fields.forEach(function (field) {
            var row = document.createElement("tr");
            var parts = Array.isArray(field) ? field : [field, "", ""];
            row.appendChild(node("td", "", formatCell(parts[0])));
            row.appendChild(node("td", "", formatCell(parts[1])));
            row.appendChild(node("td", "", formatCell(parts[2])));
            tbody.appendChild(row);
          });

          table.append(thead, tbody);
          wrap.appendChild(table);
          body.appendChild(wrap);
        } else {
          body.appendChild(node("div", "empty-state", "暂无字段说明"));
        }

        card.append(head, body);
        return card;
      }

      function buildParamsCard(method) {
        var card = node("section", "card");
        var head = node("div", "card-head");
        head.appendChild(node("h3", "", "参数"));

        var body = node("div", "card-body");
        var form = node("div", "params-grid");
        form.id = "paramForm";

        if (method.params.length) {
          method.params.forEach(function (param, index) {
            form.appendChild(buildParamField(param, index, method));
          });
        } else {
          form.appendChild(node("div", "empty-state", "该接口无需参数。"));
        }

        var actions = node("div", "actions");
        var runButton = node("button", "btn primary", "运行");
        runButton.type = "button";
        runButton.disabled = !method.implemented;
        if (!method.implemented) {
          runButton.title = "该接口尚未实现";
        }
        runButton.addEventListener("click", function () {
          runSelectedInterface();
        });

        var exampleButton = node("button", "btn", "填入示例参数");
        exampleButton.type = "button";
        exampleButton.addEventListener("click", function () {
          fillExampleParams(method);
        });

        actions.append(runButton, exampleButton);
        body.append(form, actions);
        card.append(head, body);
        return card;
      }

      function buildParamField(param, index, method) {
        var field = node("label", "param-field");
        var top = node("div", "param-top");
        var nameWrap = node("span", "param-name");
        nameWrap.appendChild(node("span", "", safeString(param.name) || "param"));
        if (param.required) {
          nameWrap.appendChild(node("span", "required", "*"));
        }

        var type = safeString(param.type) || "any";
        top.append(nameWrap, node("span", "type-pill", type));

        var input = document.createElement("input");
        input.className = "param-input";
        input.type = "text";
        input.dataset.paramIndex = String(index);
        input.autocomplete = "off";
        input.value = getExampleOrDefault(method, param);
        input.placeholder = isListType(type) ? "多个值用英文逗号分隔" : "输入参数值";

        var helpParts = [];
        if (param.required) {
          helpParts.push("必填");
        }
        if (Object.prototype.hasOwnProperty.call(param, "default") && param.default !== undefined && param.default !== null) {
          helpParts.push("默认: " + formatCell(param.default));
        }
        if (isListType(type)) {
          helpParts.push("list 用英文逗号分隔");
        }

        field.append(top, input);
        if (helpParts.length) {
          field.appendChild(node("div", "param-help", helpParts.join(" · ")));
        }
        return field;
      }

      function isListType(type) {
        return /list|array|tuple|\[\]/i.test(safeString(type));
      }

      function getExampleOrDefault(method, param) {
        var name = safeString(param && param.name);
        if (method.example && Object.prototype.hasOwnProperty.call(method.example, name)) {
          return formatInputValue(method.example[name]);
        }
        if (param && Object.prototype.hasOwnProperty.call(param, "default")) {
          return formatInputValue(param.default);
        }
        return "";
      }

      function fillExampleParams(method) {
        document.querySelectorAll("#paramForm [data-param-index]").forEach(function (input) {
          var param = method.params[Number(input.dataset.paramIndex)];
          if (param) {
            input.value = getExampleOrDefault(method, param);
          }
        });
      }

      function buildResultCard() {
        var card = node("section", "card");
        var head = node("div", "card-head");
        head.appendChild(node("h3", "", "结果"));
        var body = node("div", "card-body");
        body.id = "resultOutput";
        body.appendChild(node("div", "empty-state", "运行后显示结果"));
        card.append(head, body);
        return card;
      }

      function collectParams(method) {
        var params = {};
        document.querySelectorAll("#paramForm [data-param-index]").forEach(function (input) {
          var param = method.params[Number(input.dataset.paramIndex)];
          if (!param) {
            return;
          }
          var value = parseParamValue(input.value, param);
          if (value !== OMIT) {
            params[safeString(param.name)] = value;
          }
        });
        return params;
      }

      function parseParamValue(rawValue, param) {
        var raw = String(rawValue == null ? "" : rawValue).trim();
        var type = safeString(param && param.type).toLowerCase();

        if (raw === "") {
          return param && param.required ? "" : OMIT;
        }

        if (/^(\[|\{|")/.test(raw) || raw === "null" || raw === "true" || raw === "false") {
          try {
            return JSON.parse(raw);
          } catch (error) {
            // 继续按输入类型解析。
          }
        }

        if (isListType(type)) {
          return raw.split(",").map(function (item) {
            return item.trim();
          }).filter(Boolean);
        }

        if (/bool|boolean/.test(type)) {
          if (/^(true|1|yes|y|是)$/i.test(raw)) {
            return true;
          }
          if (/^(false|0|no|n|否)$/i.test(raw)) {
            return false;
          }
        }

        if (/int|float|double|number/.test(type) && /^-?\d+(\.\d+)?$/.test(raw)) {
          return Number(raw);
        }

        return raw;
      }

      async function runSelectedInterface() {
        var method = state.methodMap.get(state.selectedKey);
        if (!method) {
          return;
        }

        var seq = state.requestSeq + 1;
        state.requestSeq = seq;
        var key = method.key;
        var payload = {
          namespace: method.namespace,
          method: method.name,
          params: collectParams(method)
        };

        renderResultLoading();

        try {
          var response = await fetch("/api/call", {
            method: "POST",
            headers: {
              "Accept": "application/json",
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
          });

          var text = await response.text();
          var data;
          try {
            data = text ? JSON.parse(text) : {};
          } catch (error) {
            data = {
              ok: false,
              elapsed_ms: null,
              called: "pb." + method.namespace + "." + method.name + "(...)",
              error: {
                type: "InvalidJSON",
                message: text || "接口返回内容不是 JSON"
              }
            };
          }

          if (!response.ok && data.ok !== false) {
            data = {
              ok: false,
              elapsed_ms: data.elapsed_ms,
              called: data.called || "pb." + method.namespace + "." + method.name + "(...)",
              error: {
                type: "HTTP " + response.status,
                message: response.statusText || formatCell(data)
              },
              response: data
            };
          }

          if (state.requestSeq !== seq || state.selectedKey !== key || state.activeView !== "interface") {
            return;
          }

          renderResult(data);
        } catch (error) {
          if (state.requestSeq !== seq || state.selectedKey !== key || state.activeView !== "interface") {
            return;
          }
          renderResult({
            ok: false,
            elapsed_ms: null,
            called: "pb." + method.namespace + "." + method.name + "(...)",
            error: {
              type: "NetworkError",
              message: error && error.message ? error.message : String(error)
            }
          });
        }
      }

      function renderResultLoading() {
        var output = document.getElementById("resultOutput");
        if (!output) {
          return;
        }
        clear(output);
        var line = node("div", "loading-line");
        line.append(node("span", "spinner"), node("span", "", "正在调用接口…"));
        output.appendChild(line);
      }

      function renderResult(data) {
        var output = document.getElementById("resultOutput");
        if (!output) {
          return;
        }
        clear(output);

        output.appendChild(buildResultMeta(data));

        if (data && (data.ok === false || data.error)) {
          output.appendChild(buildErrorBox(data.error || {}));
          output.appendChild(buildRawJson(data));
          return;
        }

        var kind = safeString(data && data.kind);
        if (kind === "table") {
          renderTableResult(output, data);
        } else if (kind === "dict") {
          renderDictResult(output, data);
        } else if (kind === "text") {
          output.appendChild(node("pre", "text-block", formatCell(data && data.data)));
        } else {
          output.appendChild(node("div", "empty-state", "未知结果类型"));
        }

        output.appendChild(buildRawJson(data));
      }

      function buildResultMeta(data) {
        var meta = node("div", "result-meta");
        meta.appendChild(buildMetaItem("调用串", data && Object.prototype.hasOwnProperty.call(data, "called") ? data.called : "—"));
        meta.appendChild(buildMetaItem("耗时", data && data.elapsed_ms !== undefined && data.elapsed_ms !== null ? data.elapsed_ms + " ms" : "—"));
        return meta;
      }

      function buildMetaItem(label, value) {
        var item = node("span", "meta-item");
        item.append(node("span", "", label + ":"), node("span", "meta-value", formatCell(value)));
        return item;
      }

      function buildErrorBox(error) {
        var box = node("div", "error-box");
        box.appendChild(node("div", "error-type", formatCell(error.type || "Error")));
        box.appendChild(node("div", "", formatCell(error.message || "接口调用失败")));
        return box;
      }

      function renderTableResult(output, data) {
        var columns = asArray(data && data.columns).map(formatCell);
        var rows = asArray(data && data.rows);
        var totalRows = data && data.total_rows !== undefined ? data.total_rows : rows.length;
        var shown = data && data.shown !== undefined ? data.shown : rows.length;

        var note = node("div", "result-note");
        note.appendChild(node("span", "", "显示 " + formatCell(shown) + " / " + formatCell(totalRows) + " 行"));
        output.appendChild(note);

        if (data && data.attrs && typeof data.attrs === "object") {
          output.appendChild(buildAttrs(data.attrs));
        }

        if (!columns.length && rows.length) {
          var maxLen = rows.reduce(function (max, row) {
            return Math.max(max, Array.isArray(row) ? row.length : Object.keys(row || {}).length);
          }, 0);
          columns = Array.from({ length: maxLen }, function (_, index) {
            return "列" + (index + 1);
          });
        }

        if (!rows.length) {
          output.appendChild(node("div", "empty-state", "无数据行"));
          return;
        }

        var wrap = node("div", "table-wrap");
        var table = document.createElement("table");
        var thead = document.createElement("thead");
        var headRow = document.createElement("tr");
        columns.forEach(function (column) {
          headRow.appendChild(node("th", "", column));
        });
        thead.appendChild(headRow);

        var tbody = document.createElement("tbody");
        rows.forEach(function (row) {
          var tr = document.createElement("tr");
          columns.forEach(function (column, index) {
            var value = Array.isArray(row) ? row[index] : row && row[column];
            tr.appendChild(node("td", "", formatCell(value)));
          });
          tbody.appendChild(tr);
        });

        table.append(thead, tbody);
        wrap.appendChild(table);
        output.appendChild(wrap);
      }

      function buildAttrs(attrs) {
        var wrap = node("div", "attrs");
        Object.keys(attrs).forEach(function (key) {
          var pill = node("span", "attr-pill");
          pill.append(node("span", "", key + ":"), node("span", "attr-value", formatCell(attrs[key])));
          wrap.appendChild(pill);
        });
        return wrap;
      }

      function renderDictResult(output, data) {
        var dict = data && data.data && typeof data.data === "object" ? data.data : {};
        var entries = Object.keys(dict);

        if (!entries.length) {
          output.appendChild(node("div", "empty-state", "空 dict"));
          return;
        }

        var wrap = node("div", "table-wrap");
        var table = document.createElement("table");
        var thead = document.createElement("thead");
        var headRow = document.createElement("tr");
        ["键", "值"].forEach(function (label) {
          headRow.appendChild(node("th", "", label));
        });
        thead.appendChild(headRow);

        var tbody = document.createElement("tbody");
        entries.forEach(function (key) {
          var tr = document.createElement("tr");
          tr.append(node("td", "", key), node("td", "", formatCell(dict[key])));
          tbody.appendChild(tr);
        });

        table.append(thead, tbody);
        wrap.appendChild(table);
        output.appendChild(wrap);
      }

      function buildRawJson(data) {
        var details = node("details", "raw-json");
        details.appendChild(node("summary", "", "原始 JSON"));
        var json = "";
        try {
          json = JSON.stringify(data, null, 2);
        } catch (error) {
          json = formatCell(data);
        }
        details.appendChild(node("pre", "json-block", json));
        return details;
      }

      function renderMatrix() {
        state.activeView = "matrix";
        state.requestSeq += 1;
        renderSidebar();
        clear(content);

        var card = node("section", "card");
        var head = node("div", "card-head");
        head.appendChild(node("h2", "", "能力矩阵"));
        var body = node("div", "card-body");

        var legend = node("div", "matrix-legend");
        legend.append(
          node("span", "support yes", "● 支持"),
          node("span", "support no", "○ 未支持"),
          node("span", "support text", "文本为后端返回说明")
        );
        body.appendChild(legend);

        if (!state.capabilities.length) {
          body.appendChild(node("div", "empty-state", "暂无能力矩阵数据"));
          card.append(head, body);
          content.appendChild(card);
          return;
        }

        var wrap = node("div", "table-wrap");
        var table = document.createElement("table");
        var thead = document.createElement("thead");
        var headRow = document.createElement("tr");
        ["能力", "dc", "tdx", "ths"].forEach(function (label) {
          headRow.appendChild(node("th", "", label));
        });
        thead.appendChild(headRow);

        var tbody = document.createElement("tbody");
        state.capabilities.forEach(function (capability) {
          var tr = document.createElement("tr");
          tr.appendChild(node("td", "", formatCell(capability && capability.capability)));
          ["dc", "tdx", "ths"].forEach(function (source) {
            tr.appendChild(buildSupportCell(capability && capability[source]));
          });
          tbody.appendChild(tr);
        });

        table.append(thead, tbody);
        wrap.appendChild(table);
        body.appendChild(wrap);
        card.append(head, body);
        content.appendChild(card);
      }

      function buildSupportCell(value) {
        var td = document.createElement("td");
        var span = node("span", "support");
        var normalized = normalizeSupport(value);
        span.classList.add(normalized.type);
        span.textContent = normalized.text;
        td.appendChild(span);
        return td;
      }

      function normalizeSupport(value) {
        if (value === true) {
          return { type: "yes", text: "● 支持" };
        }
        if (value === false || value === null || value === undefined || value === "") {
          return { type: "no", text: "○ 未支持" };
        }

        var text = String(value);
        if (/^(true|1|yes|y|是|支持|可用|√|✓)$/i.test(text)) {
          return { type: "yes", text: "● 支持" };
        }
        if (/^(false|0|no|n|否|不支持|不可用|×|x|-|—)$/i.test(text)) {
          return { type: "no", text: "○ 未支持" };
        }
        return { type: "text", text: formatCell(value) };
      }

      async function loadInterfaces() {
        setStatus("正在连接本地接口", "");
        try {
          var response = await fetch("/api/interfaces", {
            headers: {
              "Accept": "application/json"
            }
          });
          if (!response.ok) {
            throw new Error("HTTP " + response.status + " " + (response.statusText || ""));
          }

          var data = await response.json();
          normalizeCatalog(data && data.catalog);
          state.capabilities = asArray(data && data.capabilities);

          setStatus("已加载 " + state.methods.length + " 个接口", "is-ready");

          if (state.methods.length) {
            var first = state.methods.find(function (method) {
              return method.implemented;
            }) || state.methods[0];
            state.selectedKey = first.key;
            state.activeView = "interface";
            renderSidebar();
            renderInterface(first);
          } else {
            renderSidebar();
            clear(content);
            content.appendChild(node("div", "empty-state", "未返回接口目录"));
          }
        } catch (error) {
          setStatus("接口目录加载失败", "is-error");
          clear(content);
          var card = node("section", "card");
          var body = node("div", "card-body");
          body.appendChild(buildErrorBox({
            type: "LoadError",
            message: error && error.message ? error.message : String(error)
          }));
          card.appendChild(body);
          content.appendChild(card);
        }
      }

      searchInput.addEventListener("input", function (event) {
        state.query = event.target.value.trim().toLowerCase();
        renderSidebar();
      });

      matrixButton.addEventListener("click", function () {
        renderMatrix();
      });

      window.__probarEscapeHtml = escapeHtml;
      loadInterfaces();
    })();
  </script>

  }

  function getGroupKey(group) {
    if (group.dataset.collapseKey) return group.dataset.collapseKey;
    const groups = Array.from(document.querySelectorAll(".catalog-group"));
    const head = getDirectChild(group, "group-head") || group.querySelector(".group-head");
    const label = head ? getHeadText(head) : "group";
    const key = `${label || "group"}:${groups.indexOf(group)}`;
    group.dataset.collapseKey = key;
    return key;
  }

  function getCatalogRoot() {
    const firstGroup = document.querySelector(".catalog-group");
    if (!firstGroup) return document;
    return (
      firstGroup.closest("aside, nav, .sidebar, .side-bar, .catalog, .catalog-panel, .left-panel") ||
      firstGroup.parentElement ||
      document
    );
  }

  function looksLikeSearchInput(input) {
    if (!input || !("value" in input)) return false;
    const type = (input.getAttribute("type") || "text").toLowerCase();
    if (!["", "search", "text"].includes(type)) return false;

    const meta = [
      input.id,
      input.name,
      input.className,
      input.placeholder,
      input.getAttribute("aria-label"),
      input.getAttribute("data-role"),
    ]
      .join(" ")
      .toLowerCase();

    if (
      meta.includes("search") ||
      meta.includes("filter") ||
      meta.includes("\u641c\u7d22") ||
      meta.includes("\u7b5b\u9009")
    ) {
      return true;
    }

    return getCatalogRoot().contains(input);
  }

  function isSearching() {
    const inputs = Array.from(document.querySelectorAll("input, textarea")).filter(looksLikeSearchInput);
    if (lastSearchInput && document.contains(lastSearchInput) && looksLikeSearchInput(lastSearchInput)) {
      inputs.push(lastSearchInput);
    }
    return inputs.some((input) => String(input.value || "").trim().length > 0);
  }

  function setExpanded(group, expanded) {
    const head = getDirectChild(group, "group-head") || group.querySelector(".group-head");
    const list = getDirectChild(group, "method-list") || group.querySelector(".method-list");

    group.classList.toggle("is-collapsed", !expanded);
    if (head) head.setAttribute("aria-expanded", String(expanded));
    if (list) list.setAttribute("aria-hidden", String(!expanded));
  }

  function applyState() {
    const state = readState();
    const searchActive = isSearching();

    document.querySelectorAll(".catalog-group").forEach((group) => {
      const key = getGroupKey(group);
      setExpanded(group, searchActive ? true : state[key] !== false);
    });
  }

  function scheduleApply() {
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(() => {
      rafId = 0;
      initCatalogGroups();
      applyState();
    });
  }

  function shouldIgnoreToggle(event, head) {
    const interactive = event.target.closest("a, button, input, select, textarea, label, [role='button']");
    return interactive && interactive !== head;
  }

  function toggleGroup(group) {
    const key = getGroupKey(group);
    const state = readState();
    const nextExpanded = group.classList.contains("is-collapsed");
    state[key] = nextExpanded;
    writeState(state);
    applyState();
  }

  function initCatalogGroups() {
    document.querySelectorAll(".catalog-group").forEach((group) => {
      const head = getDirectChild(group, "group-head") || group.querySelector(".group-head");
      const list = getDirectChild(group, "method-list") || group.querySelector(".method-list");
      if (!head || !list || head.hasAttribute(readyAttr)) return;

      let icon = head.querySelector(".group-collapse-icon");
      if (!icon) {
        icon = document.createElement("span");
        icon.className = "group-collapse-icon";
        icon.setAttribute("aria-hidden", "true");
        icon.textContent = "\u25be";
        head.prepend(icon);
      }

      if (!list.id) {
        idSeed += 1;
        list.id = `catalog-method-list-${idSeed}`;
      }

      if (head.tagName !== "BUTTON") {
        head.setAttribute("role", "button");
        head.setAttribute("tabindex", "0");
      } else if (!head.getAttribute("type")) {
        head.setAttribute("type", "button");
      }

      head.setAttribute("aria-controls", list.id);
      head.setAttribute(readyAttr, "true");

      head.addEventListener("click", (event) => {
        if (shouldIgnoreToggle(event, head)) return;
        toggleGroup(group);
      });

      if (head.tagName !== "BUTTON") {
        head.addEventListener("keydown", (event) => {
          if (shouldIgnoreToggle(event, head)) return;
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            toggleGroup(group);
          }
        });
      }
    });
  }

  document.addEventListener(
    "input",
    (event) => {
      if (looksLikeSearchInput(event.target)) {
        lastSearchInput = event.target;
        scheduleApply();
      }
    },
    true
  );

  const observer = new MutationObserver(scheduleApply);

  function start() {
    initCatalogGroups();
    applyState();
    if (document.body) observer.observe(document.body, { childList: true, subtree: true });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", start, { once: true });
  } else {
    start();
  }
})();
</script>
</body>
</html>
