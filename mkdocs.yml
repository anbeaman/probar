site_name: probar 文档
site_description: 稳定、可观测的 A 股数据接入层(东方财富 / 通达信 / 同花顺)
site_url: https://probar.readthedocs.io/
repo_url: https://github.com/anbeaman/probar
repo_name: anbeaman/probar
docs_dir: docs

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite

# 维护者宪章含仓库相对链接,不进文档站构建
exclude_docs: |
  ENGINEERING_GUIDE.md

nav:
  - 首页: index.md
  - 安装: install.md
  - 快速上手: quickstart.md
  - 接口指南:
      - 东方财富 pb.dc: guide/eastmoney.md
      - 通达信 pb.tdx: guide/tdx.md
      - 同花顺 pb.ths: guide/ths.md
      - 跨源 pb.auto: guide/auto.md
  - 参考:
      - 能力矩阵: reference/capabilities.md
      - 错误模型: reference/errors.md
      - 数据列与单位: reference/schema.md
  - 接口测试台: playground.md
  - 更新日志: changelog.md
