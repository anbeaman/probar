name: release

# 打 v* 标签即构建并发布到 PyPI。
# 采用 PyPI Trusted Publishing(OIDC,无需在仓库存 API Token):
#   一次性在 https://pypi.org/manage/account/publishing/ 配置受信发布者:
#   owner=<你的GitHub账号> repo=probar workflow=release.yml environment=pypi
on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC,供 Trusted Publishing 使用
      contents: write # 创建 GitHub Release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify (lint + type + test)
        run: |
          python -m pip install -e ".[dev]"
          ruff check probar tests scripts
          mypy probar
          pytest
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
